<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white border-r p-4">
            <h2 class="text-lg font-bold mb-4">Sidebar</h2>
            <ul class="space-y-2">
                <li class="p-2 bg-gray-100 rounded">Menu 1</li>
                <li class="p-2 bg-gray-100 rounded">Menu 2</li>
                <li class="p-2 bg-blue-100 rounded">Encryption Test</li>
            </ul>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 p-6 overflow-auto">
            <div class="space-y-6 w-full">
                <h1 class="text-2xl font-bold">🧪 加密解密测试</h1>
                
                <!-- Test Component Container -->
                <div class="space-y-4 w-full h-full flex flex-col">
                    <div class="w-full flex-1 flex flex-col bg-white rounded-lg shadow">
                        <div class="p-6">
                            <div class="space-y-6 flex-1 overflow-auto">
                                <!-- Configuration Selector -->
                                <div class="space-y-2">
                                    <label class="block text-sm font-medium">选择测试配置</label>
                                    <select class="w-full p-2 border rounded">
                                        <option>配置1</option>
                                        <option>配置2</option>
                                    </select>
                                </div>
                                
                                <!-- Test Input Area -->
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium mb-1">测试文本</label>
                                        <textarea class="w-full p-2 border rounded" rows="3">测试文本内容</textarea>
                                    </div>
                                    
                                    <div class="flex gap-2 flex-wrap">
                                        <button class="px-4 py-2 bg-gray-200 rounded">加密</button>
                                        <button class="px-4 py-2 bg-gray-200 rounded">解密</button>
                                        <button class="px-4 py-2 bg-blue-500 text-white rounded">完整测试</button>
                                    </div>
                                </div>
                                
                                <!-- Results Area -->
                                <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 w-full flex-1 min-h-0">
                                    <!-- Encryption Result -->
                                    <div class="space-y-2 flex flex-col h-full">
                                        <label class="flex items-center gap-2 flex-shrink-0">
                                            🔒 加密结果
                                            <span class="text-xs text-green-600">✓ 已加密</span>
                                        </label>
                                        <textarea class="font-mono text-sm bg-gray-100 flex-1 min-h-[120px] w-full p-2 resize-none">这里是加密结果...</textarea>
                                    </div>
                                    
                                    <!-- Decryption Result -->
                                    <div class="space-y-2 flex flex-col h-full">
                                        <label class="flex items-center gap-2 flex-shrink-0">
                                            🔓 解密结果
                                            <span class="text-xs text-green-600">✓ 已解密</span>
                                        </label>
                                        <textarea class="font-mono text-sm bg-gray-100 flex-1 min-h-[120px] w-full p-2 resize-none">这里是解密结果...</textarea>
                                        
                                        <!-- Result Comparison -->
                                        <div class="text-sm p-2 rounded bg-green-100 text-green-800 border border-green-200 flex-shrink-0">
                                            ✅ 解密结果与原文一致
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Statistics -->
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm flex-shrink-0">
                                    <div class="bg-gray-100 p-3 rounded">
                                        <div class="text-gray-500">原文大小</div>
                                        <div class="font-medium">100 字符</div>
                                    </div>
                                    <div class="bg-gray-100 p-3 rounded">
                                        <div class="text-gray-500">密文大小</div>
                                        <div class="font-medium">150 字符</div>
                                    </div>
                                    <div class="bg-gray-100 p-3 rounded">
                                        <div class="text-gray-500">压缩比</div>
                                        <div class="font-medium">150%</div>
                                    </div>
                                    <div class="bg-gray-100 p-3 rounded">
                                        <div class="text-gray-500">测试状态</div>
                                        <div class="font-medium text-green-600">已完成</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Debug info
        console.log('Window size:', window.innerWidth, 'x', window.innerHeight);
        console.log('Document width:', document.documentElement.scrollWidth);
        
        // Highlight the main content area
        document.querySelector('.flex-1').style.outline = '2px solid red';
        document.querySelector('.space-y-4.w-full').style.outline = '2px solid blue';
        document.querySelector('.w-full.flex-1.flex.flex-col').style.outline = '2px solid green';
    </script>
</body>
</html>
